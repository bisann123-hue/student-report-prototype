<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Arabic Student Report - Final Prototype</title>
<style>
:root{
  --teal:#0D9488;--teal-light:#CCFBF1;--teal-soft:#F0FDFA;
  --text:#1E293B;--text2:#64748B;--text3:#94A3B8;
  --border:#E2E8F0;--bg:#F8FAFC;--white:#fff;
  --green:#22C55E;--amber:#F59E0B;--red:#EF4444;--blue:#3B82F6;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,"Segoe UI",Arial,sans-serif;background:#EFF2F5;color:var(--text);font-size:13px}
.shell{display:grid;grid-template-columns:210px 1fr;grid-template-rows:52px 1fr;min-height:100vh}
.topbar{grid-column:1/-1;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:30px}
.logo{width:110px;font-weight:800;color:#526070}.logo span{font-size:20px}.logo small{display:block;font-size:7px;margin-top:-4px}
.topnav{display:flex;gap:28px;height:100%;align-items:center;flex:1}.topnav a{height:100%;display:flex;align-items:center;color:#667085;text-decoration:none;border-bottom:2px solid transparent}.topnav a.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:700}
.avatar{width:32px;height:32px;border-radius:50%;background:#475569;color:white;display:grid;place-items:center;font-weight:800}
.sidebar{background:#fff;border-right:1px solid var(--border);padding:14px 0}.class-title{padding:10px 20px;font-weight:800;border-bottom:1px solid var(--border);margin-bottom:10px}.side-group{padding:8px 0;border-bottom:1px solid var(--border)}.side-item{padding:10px 24px;color:#566276}.side-item.active{color:var(--teal);font-weight:800;border-left:3px solid var(--teal);background:#fbffff;padding-left:21px}
.main{padding:18px 24px 36px;overflow:auto}.panel{background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 24px rgba(15,23,42,.06);padding:18px 22px 26px}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:14px}.student{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:900}.student-face{width:32px;height:32px;border-radius:50%;background:#dbeafe;display:grid;place-items:center}
.actions{display:flex;gap:8px}.icon-btn{width:38px;height:38px;border:1px solid #cbd5e1;border-radius:10px;background:#fff;color:#475569;font-size:18px;display:grid;place-items:center;cursor:pointer}.icon-btn:hover{border-color:var(--teal);background:var(--bg)}
.skill-strip{display:grid;grid-template-columns:repeat(4,minmax(160px,1fr));gap:12px;margin:8px 0 10px}.skill-card{border:1px solid var(--border);border-radius:12px;background:#fff;min-height:86px;padding:14px;display:flex;justify-content:space-between;gap:10px;cursor:pointer;transition:.15s}.skill-card:hover{box-shadow:0 6px 18px rgba(15,23,42,.08);transform:translateY(-1px)}.skill-card.active{border:2px solid var(--teal);background:var(--teal-soft)}.skill-title{font-size:12px;color:var(--text2);font-weight:800;margin-bottom:7px}.skill-score{font-size:22px;font-weight:950;line-height:1}.skill-score.empty{color:var(--text3)}.skill-meta{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}.latest-pill,.status-pill{border-radius:999px;padding:4px 9px;font-size:10px;font-weight:900}.latest-pill{background:var(--teal-light);color:#047857}.above{background:#dcfce7;color:#15803d}.on{background:#fef3c7;color:#92400e}.below{background:#fee2e2;color:#b91c1c}.pending{background:#fef3c7;color:#92400e}.progress{background:#dbeafe;color:#1d4ed8}.not-started{background:#f1f5f9;color:#64748b}.skill-icon{width:34px;height:34px;border-radius:9px;background:var(--teal-light);color:var(--teal);display:grid;place-items:center;font-size:16px}
.term-row{display:flex;align-items:center;justify-content:flex-end;margin:6px 0 16px}.attempt-tabs{display:flex;gap:8px;flex-wrap:wrap}.attempt-tab{border:0;background:#f1f5f9;color:#64748b;min-width:82px;padding:8px 12px;border-radius:8px;font-weight:800;cursor:pointer}.attempt-tab.active{background:#fff;color:#334155;outline:1px solid #9aa7b5;box-shadow:0 2px 8px rgba(15,23,42,.06)}.attempt-tab.disabled{opacity:.55;cursor:not-allowed}.tick{color:#16a34a}.growth{color:#64748b;font-weight:900}
.summary-line{color:#64748b;font-weight:700;margin:16px 0 10px}.summary-card{display:grid;grid-template-columns:1.4fr 1fr 1fr 2.2fr;background:#f7f9fc;border-radius:12px;overflow:hidden;margin-bottom:22px}.summary-cell{padding:15px 18px;border-right:1px solid var(--border);min-height:96px}.summary-cell:last-child{border-right:none}.label{color:#64748b;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.03em}.big-value{font-size:30px;font-weight:950;margin-top:10px}.grade-pill{background:#dff3d5;color:#407c2e;border-radius:999px;padding:7px 16px;font-weight:900;margin-left:10px;font-size:15px}.info-text{color:#5b6676;line-height:1.5;font-size:13px}.link{color:var(--teal);text-decoration:underline}
.section{margin-top:20px;border-top:1px solid var(--border);padding-top:16px}.section-header{display:flex;align-items:center;justify-content:space-between;font-weight:950;margin-bottom:12px;cursor:pointer}.section-header span{font-size:12px;color:#94a3b8;font-weight:800}
.attempt-progress-row{display:grid;grid-template-columns:180px 1fr 130px;gap:18px;align-items:center;margin:16px 0}.attempt-title{font-weight:950}.attempt-date{color:#7b8794;font-size:12px;margin-top:4px}.progress-shell{height:26px;border:1px solid #dbe1e8;border-radius:6px;overflow:hidden;background:white}.progress-fill{height:100%;background:#a8db8f}.progress-fill.pending-fill{background:#f59e0b}.progress-upcoming{height:100%;background:#f1f5f9;color:#7b8794;display:flex;align-items:center;padding-left:14px;font-size:12px;font-weight:700}.result-mini{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:center;color:#475569;font-weight:800}
.domain-table{width:100%;border-collapse:collapse}.domain-table th,.domain-table td{border-bottom:1px solid #edf0f3;padding:12px;text-align:left}.domain-table th{color:#64748b;font-size:12px}.score-badge{display:inline-flex;min-width:34px;height:28px;padding:0 10px;align-items:center;justify-content:center;border-radius:999px;font-weight:900}.score-strong{background:#d8f2cf;color:#347a2a}.score-mid{background:#fff0b8;color:#8a6400}.score-low{background:#ffd4d4;color:#b42318}.score-blue{background:#d6ebff;color:#2563eb}
.standards-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}.standard-group{border-left:4px solid var(--red);padding-left:14px}.standard-group.meeting{border-left-color:var(--green)}.standard-title{font-weight:950;margin-bottom:10px}.standard-list{margin:0;padding-left:18px;line-height:1.8}.arabic{direction:rtl;text-align:right;font-family:Tahoma,Arial,sans-serif}
.history-chart{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px}.history-top{display:flex;gap:38%;margin-bottom:14px;font-weight:800}.history-top strong{display:block;font-size:20px;margin-top:5px}svg{width:100%;height:220px;overflow:visible}.hidden{display:none!important}
@media(max-width:1100px){.shell{grid-template-columns:80px 1fr}.side-item span,.class-title span{display:none}.skill-strip{grid-template-columns:repeat(2,1fr)}.summary-card,.standards-grid{grid-template-columns:1fr}.attempt-progress-row{grid-template-columns:150px 1fr}.result-mini{grid-column:2}}
</style>
</head>
<body>
<div class="shell">
<header class="topbar"><div class="logo"><span>Alef</span><small>EDUCATION</small></div><nav class="topnav"><a>Home</a><a class="active">Classes</a><a>task Center</a></nav><div>✉️</div><div class="avatar">NR</div></header>
<aside class="sidebar"><div class="class-title">⏱️ <span>Pathways Class</span> ▾</div><div class="side-group"><div class="side-item">🧭 <span>Class</span></div><div class="side-item">📈 <span>Progress</span></div><div class="side-item">👨‍🎓 <span>Students</span></div><div class="side-item">🎓 <span>Teacher Activities</span></div></div><div class="side-group"><div class="side-item">📘 <span>Library</span></div></div><div class="side-group"><div class="side-item">🧪 <span>Diagnostics</span></div><div class="side-item"> <span>Test Management</span></div><div class="side-item"> <span>Class Report</span></div><div class="side-item active"> <span>Student Report</span></div></div></aside>
<main class="main"><section class="panel"><div class="header-row"><div class="student"><div class="student-face">👦</div> Ahmed Al Nasser ▾</div><div class="actions"><button class="icon-btn" title="History">↩</button><button class="icon-btn" title="Download">⬇️</button></div></div><div id="topArea"></div><div id="reportContent"></div></section></main>
</div>
<script>
const CURRENT_LATEST_ATTEMPT="term2";
const data={
reading:{label:"Reading",icon:"▣",attempts:[{key:"term1",short:"Term 1",label:"Beginning of the Year",date:"5th Sep, 2025 - 19th Dec, 2025",scale:611,grade:6,progress:74,completed:true},{key:"term2",short:"Term 2",label:"Middle of the Year",date:"5th Jan, 2026 - 28th Mar, 2026",scale:614,grade:6,progress:78,growth:3,completed:true},{key:"term3",short:"Term 3",label:"End of the Year",date:"20th Mar, 2026 - 19th Jul, 2026",scale:"--",grade:"--",progress:0,upcoming:true}],alDhad:"100D",percentile:"70th",description:"Students at this level can read at a basic-to-expected level, but may still need support with deeper understanding, inference, and vocabulary in context.",domains:[["Foundational Skills","✓",9,"--"],["Informational",7,9,"--"],["Language",8,9,"--"],["Literature",7,9,"--"]],support:["أن يتقن المتعلم تقنيات وأنواع الوصف في الكتابة النصية","أن يميز المتعلم المفاهيم النحوية والصرفية في الجملة الفعلية"],meeting:["أن يستخدم المتعلم استراتيجيات مناسبة لقراءة النصوص","أن يظهر المتعلم قدرته على تفسير علامات الترقيم"],history:[480,535,610,690,744]},
listening:{label:"Listening",icon:"🎧",attempts:[{key:"term1",short:"Term 1",label:"Beginning of the Year",date:"5th Sep, 2025 - 19th Dec, 2025",scale:840,grade:7,progress:70,completed:true},{key:"term2",short:"Term 2",label:"Middle of the Year",date:"5th Jan, 2026 - 28th Mar, 2026",scale:870,grade:8,progress:82,growth:30,completed:true},{key:"term3",short:"Term 3",label:"End of the Year",date:"20th Mar, 2026 - 19th Jul, 2026",scale:"--",grade:"--",progress:0,upcoming:true}],alDhad:"115D",percentile:"82nd",description:"Students at this level can understand main ideas in spoken Arabic, identify supporting details, and follow multi-step listening tasks with increasing confidence.",domains:[["Listening Comprehension",7,8,"--"],["Main Idea",7,8,"--"],["Details and Evidence",6,8,"--"],["Vocabulary in Context",7,9,"--"]],support:["أن يحدد المتعلم الفكرة الرئيسة في نص مسموع قصير","أن يميز المتعلم بين الرأي والحقيقة في النص المسموع"],meeting:["أن يستنتج المتعلم معاني الكلمات من سياق النص المسموع","أن يتابع المتعلم تعليمات متعددة الخطوات بدقة"],history:[620,670,735,810,870]},
writing:{label:"Writing",icon:"✎",attempts:[{key:"term1",short:"Term 1",label:"Beginning of the Year",date:"5th Sep, 2025 - 19th Dec, 2025",scale:680,grade:6,progress:76,completed:true},{key:"term2",short:"Term 2",label:"Middle of the Year",date:"5th Jan, 2026 - 28th Mar, 2026",scale:"Pending Evaluation",grade:"--",progress:100,pending:true},{key:"term3",short:"Term 3",label:"End of the Year",date:"20th Mar, 2026 - 19th Jul, 2026",scale:"--",grade:"--",progress:0,upcoming:true}],alDhad:"--",percentile:"--",description:"The latest writing attempt is submitted and awaiting evaluation. Previous completed results remain available in the attempts and historical sections.",domains:[["Ideas and Content",6,"Pending","--"],["Organization",6,"Pending","--"],["Vocabulary",7,"Pending","--"],["Grammar and Conventions",5,"Pending","--"]],support:["أن يطوّر المتعلم أفكاره في الكتابة باستخدام تفاصيل وأمثلة مناسبة","أن يوظّف المتعلم علامات الترقيم والقواعد الإملائية بدقة أكبر"],meeting:["أن ينظم المتعلم النص في مقدمة وعرض وخاتمة واضحة","أن يستخدم المتعلم مفردات مناسبة للسياق والغرض من الكتابة"],history:[520,590,640,680,680]},
speaking:{label:"Speaking",icon:"🎙",attempts:[{key:"term1",short:"Term 1",label:"Beginning of the Year",date:"5th Sep, 2025 - 19th Dec, 2025",scale:505,grade:6,progress:68,completed:true},{key:"term2",short:"Term 2",label:"Middle of the Year",date:"5th Jan, 2026 - 28th Mar, 2026",scale:"--",grade:"--",progress:0,notStarted:true},{key:"term3",short:"Term 3",label:"End of the Year",date:"20th Mar, 2026 - 19th Jul, 2026",scale:"--",grade:"--",progress:0,upcoming:true}],alDhad:"--",percentile:"--",description:"The latest speaking attempt has not been completed yet. Previous completed results remain available in the attempts and historical sections.",domains:[["Pronunciation",6,"--","--"],["Fluency",6,"--","--"],["Vocabulary Use",5,"--","--"],["Response Development",5,"--","--"]],support:["أن يوسّع المتعلم إجاباته الشفهية بتفاصيل وأمثلة داعمة","أن يحسّن المتعلم وضوح النطق عند عرض الأفكار شفهياً"],meeting:["أن يعبّر المتعلم عن رأيه بوضوح في مواقف الحوار","أن يستخدم المتعلم مفردات مناسبة أثناء التحدث"],history:[430,465,490,505,505]}
};
const state={skill:"reading",term:"term2"};
const esc=v=>String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
const current=()=>data[state.skill]; const selected=()=>current().attempts.find(a=>a.key===state.term)||current().attempts[1]; const latest=k=>data[k].attempts.find(a=>a.key===CURRENT_LATEST_ATTEMPT);
function level(value){const n=Number(value);if(!Number.isFinite(n))return{label:"No data",cls:"not-started"};if(n>=850)return{label:"Above level",cls:"above"};if(n>=650)return{label:"On level",cls:"on"};return{label:"Below level",cls:"below"}}
function cardStatus(a){if(a.pending)return{label:"Pending Evaluation",cls:"pending",value:"--"};if(a.notStarted)return{label:"Not Started",cls:"not-started",value:"--"};if(a.inProgress)return{label:"In Progress",cls:"progress",value:"--"};if(a.completed){const l=level(a.scale);return{label:l.label,cls:l.cls,value:a.scale}}return{label:"Not Started",cls:"not-started",value:"--"}}
function badge(v){if(v==="✓")return"score-strong";if(v==="Pending"||v==="Pending Evaluation")return"score-mid";if(v==="--")return"";if(Number(v)>=8)return"score-blue";if(Number(v)>=6)return"score-strong";if(Number(v)>=5)return"score-mid";return"score-low"}
function renderCards(){const keys=["reading","listening","writing","speaking"];document.getElementById("topArea").innerHTML=`<div class="skill-strip">${keys.map(k=>{const s=data[k],st=cardStatus(latest(k));return `<div class="skill-card ${state.skill===k?"active":""}" data-skill="${k}"><div><div class="skill-title">Arabic ${esc(s.label)}</div><div class="skill-score ${st.value==="--"?"empty":""}">${esc(st.value)}</div><div class="skill-meta"><span class="latest-pill">Latest</span><span class="status-pill ${st.cls}">${esc(st.label)}</span></div></div><div class="skill-icon">${s.icon}</div></div>`}).join("")}</div><div class="term-row"><div class="attempt-tabs">${current().attempts.map(a=>`<button class="attempt-tab ${state.term===a.key?"active":""} ${a.upcoming?"disabled":""}" data-term="${a.key}">${esc(a.short)} ${a.completed?`<span class="tick">✓</span> ${esc(a.scale)}`:a.pending?"Pending":a.notStarted?"--":"--"} ${a.growth?`<span class="growth">↑ ${esc(a.growth)}</span>`:""}</button>`).join("")}</div></div>`}
function renderReport(){const s=current(),sel=selected(),idx=["term1","term2","term3"].indexOf(state.term)+1;const rows=s.attempts.map(a=>`<div class="attempt-progress-row"><div><div class="attempt-title">${esc(a.label)}</div><div class="attempt-date">${esc(a.date)}</div></div><div class="progress-shell">${a.upcoming?`<div class="progress-upcoming">Upcoming (Not Available Yet)</div>`:a.pending?`<div class="progress-fill pending-fill" style="width:100%"></div>`:a.notStarted?`<div class="progress-upcoming">Not started</div>`:`<div class="progress-fill" style="width:${a.progress}%"></div>`}</div><div class="result-mini"><span class="score-badge ${a.grade==="--"?"":"score-strong"}">${esc(a.grade)}</span><span>${esc(a.scale)} ${a.growth?`<span class="growth">↑${esc(a.growth)}</span>`:""}</span></div></div>`).join("");const domains=s.domains.map(r=>`<tr><td>${esc(r[0])}</td><td><span class="score-badge ${badge(r[idx])}">${esc(r[idx])}</span></td></tr>`).join("");document.getElementById("reportContent").innerHTML=`<div class="summary-line">Results Overview (Academic Year 2024-2025) &nbsp; | &nbsp; Selected: ${esc(sel.short)} &nbsp; | &nbsp; Performance reflects selected term</div><div class="summary-card"><div class="summary-cell"><div class="label">Performance<br>(Score | Grade Level)</div><div class="big-value">${esc(sel.scale)} ${sel.growth?`<span style="font-size:16px;color:#64748b">↑ ${esc(sel.growth)}</span>`:""} <span style="font-weight:400">|</span> <span class="grade-pill">${esc(sel.grade)}</span></div></div><div class="summary-cell"><div class="label">Al Dhad<br>(Miqyas AlDhad Score)</div><div class="big-value">${esc(s.alDhad)}</div></div><div class="summary-cell"><div class="label">Percentile<br>(UAE Norms)</div><div class="big-value">${esc(s.percentile)}</div></div><div class="summary-cell"><div class="info-text">${esc(s.description)} <span class="link">Learn More</span></div></div></div><div class="section">${rows}</div><div class="section"><div class="section-header" data-toggle="domainsBody">⌃ &nbsp; ${state.skill==="writing"||state.skill==="speaking"?"Criteria scores":"Domain scores"} <span>${esc(sel.label)}</span></div><div id="domainsBody"><table class="domain-table"><thead><tr><th>${state.skill==="writing"||state.skill==="speaking"?"Criteria":"Domain"}</th><th>${esc(sel.label)}</th></tr></thead><tbody>${domains}</tbody></table></div></div><div class="section"><div class="section-header" data-toggle="standardsBody">⌃ &nbsp; Performance on standards <span>${esc(sel.label)}</span></div><div id="standardsBody" class="standards-grid"><div class="standard-group"><div class="standard-title">Requiring support</div><ul class="standard-list arabic">${s.support.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div><div class="standard-group meeting"><div class="standard-title">Meeting expectations</div><ul class="standard-list arabic">${s.meeting.map(x=>`<li>${esc(x)}</li>`).join("")}</ul></div></div></div><div class="section"><div class="section-header" data-toggle="historyBody">⌃ &nbsp; Historical performance <span>All years</span></div><div id="historyBody" class="history-chart"><div class="history-top"><div>Last result<strong>${esc(s.history.at(-1))}</strong></div><div>Best result<strong>${esc(Math.max(...s.history))}</strong></div></div>${chart(s.history)}</div></div>`}
function chart(values){const min=400,max=900,w=900,h=210,l=45,r=20,t=16,b=30,pw=w-l-r,ph=h-t-b;const pts=values.map((v,i)=>({x:l+(pw/(values.length-1))*i,y:t+ph-((v-min)/(max-min))*ph,v}));const line=pts.map(p=>`${p.x},${p.y}`).join(" "),area=`${l},${t+ph} ${line} ${l+pw},${t+ph}`;return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polygon points="${area}" fill="#e0f5f6" opacity=".9"></polygon><polyline points="${line}" fill="none" stroke="#0891b2" stroke-width="3"></polyline>${pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="white" stroke="#0891b2" stroke-width="2"></circle>`).join("")}</svg>`}
function bind(){document.querySelectorAll("[data-skill]").forEach(el=>el.onclick=()=>{state.skill=el.dataset.skill;state.term=CURRENT_LATEST_ATTEMPT;render()});document.querySelectorAll("[data-term]").forEach(el=>el.onclick=()=>{if(el.classList.contains("disabled"))return;state.term=el.dataset.term;render()});document.querySelectorAll("[data-toggle]").forEach(el=>el.onclick=()=>document.getElementById(el.dataset.toggle)?.classList.toggle("hidden"))}
function render(){renderCards();renderReport();bind()}render();
</script>
</body>
</html>
